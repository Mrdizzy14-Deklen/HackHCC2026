<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Composer</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/panel.css" />
  </head>
  <body>
    <aside class="panel" id="panel">
      <button class="panel-handle" id="panel-toggle" aria-label="Toggle panel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>
      </button>
      <div class="header">
        <h1>Humming</h1>
        <p>Trumpet — stage 3 of 4</p>
      </div>

      <div>
        <div class="label">Section</div>
        <div class="sections">
          <button class="tab active">Trumpet</button>
          <button class="tab">Fr. horn</button>
          <button class="tab">Trombone</button>
          <button class="tab">Oboe</button>
          <button class="tab">Soprano</button>
          <button class="tab">Piano</button>
          <button class="tab">Flute</button>
          <button class="tab add" id="add-instrument" aria-label="Add instrument" title="Add instrument">+</button>
        </div>
      </div>

      <div class="record">
        <button class="record-btn" id="rec"><span class="dot"></span></button>
        <div class="pitch">
          <div>
            <span class="pitch-note" id="note">A♭4</span><span class="pitch-cents" id="cents">+3¢</span>
          </div>
          <div class="pitch-sub" id="sub">Ready to record</div>
        </div>
      </div>

      <div class="notes-wrap">
        <div class="label">14 notes detected</div>
        <div class="notes" id="notes"></div>
      </div>

      <div class="footer">
        <button class="btn">Clear</button>
        <button class="btn primary">Harmonize</button>
      </div>
    </aside>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/static/js/scene.js"></script>
    <script src="/static/js/panel.js" defer></script>
  </body>
</html>
