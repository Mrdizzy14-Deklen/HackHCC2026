<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HackHCC Composer</title>
    <link rel="icon" href="/static/favicon.ico" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/panel.css" />
  </head>
  <body>
    <!-- Liquid glass SVG filter used by the panel backdrop -->
    <svg style="display:none" aria-hidden="true">
      <defs>
        <filter id="panel-glass" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.05 0.05" numOctaves="1" seed="1" result="turbulence"/>
          <feGaussianBlur in="turbulence" stdDeviation="2" result="blurredNoise"/>
          <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="70" xChannelSelector="R" yChannelSelector="B" result="displaced"/>
          <feGaussianBlur in="displaced" stdDeviation="4" result="finalBlur"/>
          <feComposite in="finalBlur" in2="finalBlur" operator="over"/>
        </filter>
      </defs>
    </svg>

    <!-- Curtains: start closed, open via gesture (class added by scene.js) -->
    <img class="curtain left"  src="/static/pngegg.png" alt="">
    <img class="curtain right" src="/static/pngegg.png" alt="">

    <!-- Camera feed (hidden source for MediaPipe) -->
    <video id="gesture-cam" playsinline muted style="display:none"></video>

    <!-- Camera preview overlay — top-left corner -->
    <div id="cam-preview">
      <video id="gesture-cam-preview" playsinline muted></video>
      <div id="gesture-badge">—</div>
      <div id="voice-prompt" class="hidden">🎙 Say instrument name…</div>
    </div>

    <!-- Gesture hint overlay shown before curtains open — click or press Space to skip -->
    <div id="gesture-hint" title="Click to open">
      <div class="hint-icon">🤲</div>
      <p>Spread both hands apart to begin</p>
      <p class="hint-skip">or click here / press Space</p>
    </div>

    <aside class="panel collapsed" id="panel">
      <!-- liquid glass distortion layer -->
      <div class="panel-glass-bg" aria-hidden="true"></div>
      <button class="panel-handle" id="panel-toggle" aria-label="Toggle panel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>
      </button>
      <div class="header">
        <h1 id="panel-title">Select Instrument</h1>
        <p id="panel-sub">Point at an instrument on stage</p>
      </div>

      <div>
        <div class="label">Section</div>
        <div class="sections" id="sections">
          <!-- Populated by panel.js after session start -->
        </div>
      </div>

      <div class="record">
        <button class="record-btn" id="rec"><span class="dot"></span></button>
        <div class="pitch">
          <div>
            <span class="pitch-note" id="note">—</span>
          </div>
          <div class="pitch-sub" id="sub">Point at an instrument to select it</div>
        </div>
      </div>

      <div class="notes-wrap">
        <div class="label" id="notes-label">No notes yet</div>
        <div class="notes" id="notes"></div>
      </div>

      <div class="footer">
        <button class="btn" id="btn-clear">Clear</button>
        <button class="btn primary" id="btn-harmonize">Harmonize ✦</button>
      </div>
    </aside>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <!-- Transparent hand-cursor overlay — drawn by cursor.js, z-index 8 -->
    <canvas id="gesture-cursor"></canvas>

    <script type="module" src="/static/js/scene.js?v=15"></script>
    <script type="module" src="/static/js/panel.js?v=15"></script>
    <script type="module">
      import { initCursor } from "/static/js/cursor.js?v=15";
      initCursor();
    </script>
  </body>
</html>
