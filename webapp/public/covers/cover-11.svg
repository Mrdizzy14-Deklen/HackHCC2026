<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123026"/>
      <stop offset="1" stop-color="#06120d"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.3" cy="0.25" r="1">
      <stop offset="0.4" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#vig)"/>

  <!-- vinyl record + tonearm (turntable motif) -->
  <g opacity="0.92"><circle cx="720" cy="700" r="40" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="50" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="60" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="70" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="80" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="90" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="100" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="110" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="120" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="130" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="140" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="150" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="160" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="170" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="180" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="190" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="200" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="210" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="220" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="230" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="240" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="250" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="260" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="270" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="280" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="290" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="300" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="310" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="320" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="330" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="340" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="350" fill="none" stroke="#fff" stroke-opacity="0.050" stroke-width="1"/><circle cx="720" cy="700" r="360" fill="none" stroke="#fff" stroke-opacity="0.110" stroke-width="1"/><circle cx="720" cy="700" r="30" fill="#3CD9A0" fill-opacity="0.9"/><circle cx="720" cy="700" r="6" fill="#0c0c10"/></g>

  <!-- film grain -->
  <rect width="1000" height="1000" filter="url(#grain)" opacity="0.5"/>

  <!-- label / eyebrow -->

  <!-- title -->
  <text x="70" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="92" fill="#E2F4EC">Caprice</text>
  <text x="70" y="660" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-style="italic" fill="#E2F4EC">No. VII</text>

  <!-- composer + meta -->
  <text x="74" y="744" font-family="Georgia, serif" font-style="italic" font-size="34" fill="#3CD9A0">Sébastien Vaughn</text>
  <text x="74" y="930" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" letter-spacing="3" fill="#E2F4EC" fill-opacity="0.55">2026.03.13　·　09:02</text>

  <rect x="20" y="20" width="960" height="960" fill="none" stroke="#E2F4EC" stroke-opacity="0.16" stroke-width="2"/>
</svg>