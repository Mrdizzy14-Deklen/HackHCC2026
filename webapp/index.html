<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MAESTRO — Conduct your orchestra</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --stage:#0D0D0D;
    --navy:#1E1E2A;
    --navy-2:#262633;
    --navy-3:#15151E;
    --red:#B22020;
    --red-bright:#E03030;
    --silver:#C0C8D0;
    --silver-dim:#8A929B;
    --silver-faint:#5A6068;
    --hairline:rgba(192,200,208,0.10);
    --hairline-strong:rgba(192,200,208,0.18);

    --f-display:"Cormorant Garamond", "Times New Roman", serif;
    --f-sans:"Manrope", system-ui, sans-serif;
    --f-mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--stage);color:var(--silver);font-family:var(--f-sans);font-weight:400;-webkit-font-smoothing:antialiased;min-height:100vh}
  body{overflow-x:hidden}
  button{font-family:inherit;border:0;background:none;color:inherit;cursor:pointer}
  input{font-family:inherit;color:inherit;background:none;border:0;outline:0}
  a{color:inherit;text-decoration:none}

  /* ---------- shared chrome ---------- */
  .scene{min-height:100vh;display:flex;flex-direction:column;position:relative;isolation:isolate}

  /* ---------- reusable effect layers (embedded prototype canvases) ---------- */
  .fx-layer{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}

  .topbar{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:22px 56px;border-bottom:1px solid var(--hairline);
    position:relative;z-index:5;background:rgba(13,13,13,0.6);backdrop-filter:blur(8px);
  }
  .topbar .brand{justify-self:start}
  .topbar .nav-tabs{justify-self:center}
  .topbar .user-chip{justify-self:end}
  .brand{display:flex;align-items:center;gap:14px}
  .brand-mark{
    width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,var(--red-bright),var(--red) 60%,#5a0d0d);
    box-shadow:0 0 0 1px rgba(224,48,48,0.35), 0 0 24px rgba(224,48,48,0.25);
    position:relative;
  }
  .brand-mark::after{
    content:"";position:absolute;inset:9px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%, #0D0D0D 0 4px, transparent 4px);
  }
  .brand-name{font-family:var(--f-display);font-weight:600;font-size:22px;letter-spacing:0.32em;color:#EDEFF2}
  .brand-name em{font-style:italic;font-weight:500;color:var(--red-bright);letter-spacing:0}

  .nav-tabs{display:flex;gap:4px;background:var(--navy-3);border:1px solid var(--hairline);border-radius:999px;padding:5px}
  .nav-tab{
    padding:8px 22px;border-radius:999px;font-size:13px;font-weight:500;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--silver-dim);transition:all .25s ease;
  }
  .nav-tab:hover{color:var(--silver)}
  .nav-tab.active{background:var(--navy);color:var(--silver);box-shadow:inset 0 0 0 1px var(--hairline-strong)}

  .user-chip{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--silver-dim)}
  .user-chip .avatar{
    width:32px;height:32px;border-radius:50%;background:var(--navy);
    display:grid;place-items:center;font-family:var(--f-display);font-style:italic;
    color:var(--silver);border:1px solid var(--hairline-strong);font-size:15px;
  }
  .user-chip .signout{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--silver-faint);transition:color .2s}
  .user-chip .signout:hover{color:var(--red-bright)}

  /* ---------- LOGIN (hero) ---------- */
  /* Background wallpaper = rain-on-glass behind, spinning vinyl groove screen-blended in front. */
  .login-scene{justify-content:center;align-items:center;padding:60px 24px;overflow:hidden}
  .fx-rain{z-index:0;pointer-events:none}
  .fx-vinyl{z-index:1;mix-blend-mode:screen;pointer-events:none}
  /* dark vignette so the centred card stays legible over the wallpaper */
  .login-tint{
    position:absolute;inset:0;z-index:2;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 65% at 50% 50%, rgba(13,13,13,0) 0%, rgba(13,13,13,0.30) 55%, rgba(8,8,12,0.78) 100%),
      radial-gradient(ellipse 90% 60% at 50% 24%, rgba(224,48,48,0.07), transparent 60%);
  }

  .login-stack{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:30px;width:100%;max-width:440px}
  .login-brand{display:flex;align-items:center;gap:14px}

  .login-card{
    width:100%;
    background:linear-gradient(180deg, rgba(30,30,42,0.94) 0%, rgba(24,24,34,0.94) 100%);
    backdrop-filter:blur(6px);
    border:1px solid var(--hairline-strong);
    border-radius:4px;
    padding:46px 44px 40px;
    position:relative;
    box-shadow:
      0 30px 80px -20px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 60px 120px -40px rgba(178,32,32,0.18);
  }
  .login-card::before{
    content:"";position:absolute;top:-1px;left:24px;right:24px;height:1px;
    background:linear-gradient(90deg,transparent,var(--red-bright),transparent);
    opacity:0.6;
  }
  .login-card h2{
    font-family:var(--f-display);font-weight:500;font-size:34px;color:#EDEFF2;
    letter-spacing:0.01em;
  }
  .login-card h2 em{font-style:italic;color:var(--red-bright)}
  .login-card .hint{font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:var(--silver-faint);margin-bottom:34px;margin-top:8px}

  .field{margin-bottom:22px}
  .field label{display:block;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--silver-faint);margin-bottom:10px}
  .field-wrap{
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--hairline-strong);
    padding:10px 2px;transition:border-color .25s;
  }
  .field-wrap:focus-within{border-color:var(--red-bright)}
  .field-wrap svg{flex-shrink:0;color:var(--silver-faint);transition:color .25s}
  .field-wrap:focus-within svg{color:var(--silver)}
  .field input{flex:1;font-size:15px;letter-spacing:0.02em;color:var(--silver);padding:2px 0}
  .field input::placeholder{color:var(--silver-faint)}

  .check{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px;letter-spacing:0.06em;color:var(--silver-dim);margin-top:8px;margin-bottom:30px}
  .check .box{width:14px;height:14px;border:1px solid var(--silver-faint);border-radius:2px;display:grid;place-items:center;transition:all .2s}
  .check.on .box{background:var(--red);border-color:var(--red)}
  .check.on .box::after{content:"";width:6px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}

  .btn-primary{
    width:100%;padding:16px;background:var(--red);color:#fff;
    font-size:12px;letter-spacing:0.32em;text-transform:uppercase;font-weight:600;
    border-radius:2px;transition:all .25s ease;
    box-shadow:0 8px 24px -8px rgba(178,32,32,0.6), inset 0 1px 0 rgba(255,255,255,0.12);
    position:relative;overflow:hidden;
  }
  .btn-primary:hover{background:var(--red-bright);box-shadow:0 12px 32px -8px rgba(224,48,48,0.7), inset 0 1px 0 rgba(255,255,255,0.18)}
  .btn-primary:active{transform:translateY(1px)}

  .alt-btn{
    width:100%;padding:13px;border:1px solid var(--hairline-strong);
    color:var(--silver-dim);font-size:12px;letter-spacing:0.2em;text-transform:uppercase;
    border-radius:2px;transition:all .25s;background:transparent;margin-top:16px;
  }
  .alt-btn:hover{border-color:var(--silver-dim);color:var(--silver)}

  /* ---------- LIBRARY ---------- */
  .lib-scene{padding:0}
  .page-head{padding:48px 56px 36px;display:flex;justify-content:space-between;align-items:flex-end;gap:40px;border-bottom:1px solid var(--hairline)}
  .page-title{font-family:var(--f-display);font-weight:500;font-size:54px;line-height:1;color:#EDEFF2;letter-spacing:-0.005em}
  .page-title em{font-style:italic;color:var(--red-bright)}
  .page-eyebrow{font-size:11px;letter-spacing:0.4em;text-transform:uppercase;color:var(--silver-faint);margin-bottom:14px}
  .page-eyebrow .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red-bright);margin-right:10px;vertical-align:middle;box-shadow:0 0 10px var(--red-bright)}
  .head-stats{display:flex;gap:48px;text-align:right}
  .head-stat .n{font-family:var(--f-display);font-style:italic;font-weight:500;font-size:38px;color:var(--silver);line-height:1}
  .head-stat .l{font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--silver-faint);margin-top:8px}

  .lib-controls{display:flex;justify-content:space-between;align-items:center;padding:24px 56px;border-bottom:1px solid var(--hairline);gap:24px}
  .filters{display:flex;gap:6px}
  .filter{
    padding:9px 18px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--silver-dim);border:1px solid transparent;border-radius:999px;transition:all .2s;
  }
  .filter:hover{color:var(--silver)}
  .filter.active{background:var(--navy);color:var(--silver);border-color:var(--hairline-strong)}
  .filter .count{color:var(--silver-faint);margin-left:8px;font-family:var(--f-mono)}
  .lib-right{display:flex;gap:14px;align-items:center}
  .search{
    display:flex;align-items:center;gap:10px;background:var(--navy-3);border:1px solid var(--hairline);
    border-radius:999px;padding:8px 16px;width:280px;
  }
  .search input{flex:1;font-size:13px;color:var(--silver)}
  .search input::placeholder{color:var(--silver-faint)}
  .new-btn{
    padding:10px 22px;background:var(--red);color:#fff;border-radius:2px;
    font-size:11px;letter-spacing:0.22em;text-transform:uppercase;font-weight:600;
    display:flex;align-items:center;gap:10px;transition:background .2s;
  }
  .new-btn:hover{background:var(--red-bright)}
  .new-btn .plus{font-size:16px;line-height:1}

  .library{padding:40px 56px 80px;display:grid;grid-template-columns:repeat(4,1fr);gap:28px}
  .piece{
    position:relative;background:var(--navy);border:1px solid var(--hairline);
    border-radius:4px;overflow:hidden;transition:all .3s ease;cursor:pointer;
  }
  .piece:hover{transform:translateY(-3px);border-color:var(--hairline-strong);box-shadow:0 24px 50px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(224,48,48,0.18)}
  .piece-art{
    aspect-ratio:4/3;position:relative;overflow:hidden;
    background:linear-gradient(135deg, var(--navy-2) 0%, var(--navy-3) 100%);
    display:grid;place-items:center;
  }
  .piece-art::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle at 50% 50%, rgba(224,48,48,0.12), transparent 55%),
      repeating-linear-gradient(45deg, transparent 0 14px, rgba(192,200,208,0.025) 14px 15px);
  }
  .piece .vinyl{
    width:60%;aspect-ratio:1;border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%, var(--red) 0 12%, #0D0D0D 12.5% 14%, #1a1a25 14.5%),
      #0D0D0D;
    box-shadow:0 12px 30px -8px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(192,200,208,0.1);
    position:relative;
  }
  .piece .vinyl::after{
    content:"";position:absolute;inset:8%;border-radius:50%;
    background:repeating-radial-gradient(circle at 50% 50%, transparent 0 2px, rgba(192,200,208,0.03) 2px 3px);
    border:1px solid rgba(192,200,208,0.04);
  }
  .piece-badge{
    position:absolute;top:14px;left:14px;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--silver);background:rgba(13,13,13,0.7);padding:5px 10px;border-radius:2px;
    border:1px solid var(--hairline-strong);backdrop-filter:blur(6px);z-index:2;
  }
  .piece-badge.live{color:var(--red-bright);border-color:rgba(224,48,48,0.35)}
  .piece-badge.live::before{content:"";display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red-bright);margin-right:6px;vertical-align:middle;box-shadow:0 0 8px var(--red-bright);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .piece-instr{position:absolute;top:14px;right:14px;color:rgba(192,200,208,0.18);z-index:2}

  .piece-body{padding:20px 22px 22px}
  .piece-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--silver-faint);margin-bottom:10px;font-family:var(--f-mono)}
  .piece-title{font-family:var(--f-display);font-weight:500;font-size:24px;color:#EDEFF2;line-height:1.1;margin-bottom:4px;letter-spacing:0.005em}
  .piece-title em{font-style:italic;color:var(--silver)}
  .piece-composer{font-size:12px;color:var(--silver-dim);letter-spacing:0.04em;margin-bottom:18px;font-style:italic;font-family:var(--f-display)}
  .piece-foot{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--hairline)}
  .piece-foot .duration{font-family:var(--f-mono);font-size:11px;color:var(--silver-dim);letter-spacing:0.08em}
  .piece-actions{display:flex;gap:8px}
  .icon-btn{
    width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
    border:1px solid var(--hairline-strong);color:var(--silver-dim);transition:all .2s;
  }
  .icon-btn:hover{border-color:var(--silver-dim);color:var(--silver)}
  .icon-btn.play{background:var(--red);border-color:var(--red);color:#fff}
  .icon-btn.play:hover{background:var(--red-bright);border-color:var(--red-bright);transform:scale(1.08)}

  /* ---------- LEADERBOARD ---------- */
  .lb-scene{padding:0}
  .lb-wrap{padding:48px 56px 80px;display:grid;grid-template-columns:1fr 380px;gap:48px}

  /* podium gets a laser-labyrinth spotlight washing over the top 3 */
  .podium{
    display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:18px;align-items:end;margin-bottom:48px;
    position:relative;isolation:isolate;
  }
  .fx-spot{
    position:absolute;left:-4%;width:108%;top:-70px;height:calc(100% + 70px);
    border:0;z-index:4;pointer-events:none;mix-blend-mode:screen;opacity:0.85;
    -webkit-mask-image:radial-gradient(ellipse 62% 105% at 50% -6%, #000 38%, transparent 78%);
            mask-image:radial-gradient(ellipse 62% 105% at 50% -6%, #000 38%, transparent 78%);
  }
  .podium-card{
    background:var(--navy);border:1px solid var(--hairline);border-radius:4px;
    padding:28px 22px 26px;text-align:center;position:relative;overflow:hidden;
  }
  .podium-card.gold{
    border-color:rgba(178,32,32,0.45);
    background:linear-gradient(180deg, var(--navy) 0%, #251a20 100%);
    padding-top:36px;padding-bottom:34px;
    box-shadow:0 30px 60px -20px rgba(178,32,32,0.4);
  }
  .podium-card.gold::before{
    content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, transparent, var(--red-bright), transparent);
  }
  .medal{
    width:60px;height:60px;border-radius:50%;margin:0 auto 16px;
    display:grid;place-items:center;font-family:var(--f-display);font-weight:600;
    border:2px solid;position:relative;
  }
  .medal.g1{color:var(--red-bright);border-color:var(--red-bright);font-size:26px;width:74px;height:74px;
            background:radial-gradient(circle at 50% 30%, rgba(224,48,48,0.18), transparent 70%);
            box-shadow:0 0 0 1px rgba(224,48,48,0.2), 0 0 30px rgba(224,48,48,0.25)}
  .medal.g2{color:var(--silver);border-color:var(--silver-dim);font-size:22px}
  .medal.g3{color:#8a6f56;border-color:#8a6f56;font-size:22px}
  .medal::after{
    content:"";position:absolute;width:18px;height:14px;background:currentColor;
    bottom:-10px;clip-path:polygon(0 0, 100% 0, 50% 100%);opacity:0.55;
  }
  .podium-rank{font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--silver-faint);margin-bottom:10px}
  .podium-rank.gold{color:var(--red-bright)}
  .podium-name{font-family:var(--f-display);font-weight:500;font-size:24px;color:#EDEFF2;line-height:1.1;margin-bottom:4px}
  .podium-name em{font-style:italic}
  .podium-handle{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--silver-faint);font-family:var(--f-mono);margin-bottom:18px}
  .podium-score{font-family:var(--f-display);font-style:italic;font-weight:500;font-size:42px;color:var(--silver);line-height:1}
  .podium-card.gold .podium-score{color:var(--red-bright);font-size:54px}
  .podium-score-label{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--silver-faint);margin-top:6px}

  .ranks{background:var(--navy);border:1px solid var(--hairline);border-radius:4px;overflow:hidden}
  .ranks-head{
    display:grid;grid-template-columns:56px minmax(0,1fr) 110px 80px 110px 80px;
    gap:18px;
    padding:14px 26px;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;
    color:var(--silver-faint);border-bottom:1px solid var(--hairline);background:var(--navy-3);
  }
  .ranks-head div:last-child{text-align:right}
  .rank-row{
    display:grid;grid-template-columns:56px minmax(0,1fr) 110px 80px 110px 80px;
    gap:18px;
    padding:18px 26px;align-items:center;border-bottom:1px solid var(--hairline);
    transition:background .2s;
  }
  .rank-row:last-child{border-bottom:0}
  .rank-row:hover{background:rgba(192,200,208,0.025)}
  .rank-num{font-family:var(--f-display);font-style:italic;font-weight:500;font-size:24px;color:var(--silver-dim)}
  .rank-user{display:flex;align-items:center;gap:14px;min-width:0}
  .rank-user .avatar{width:38px;height:38px;border-radius:50%;background:var(--navy-3);display:grid;place-items:center;font-family:var(--f-display);font-style:italic;color:var(--silver);border:1px solid var(--hairline-strong);flex-shrink:0}
  .rank-user .who{min-width:0;display:flex;flex-direction:column;gap:3px}
  .rank-user .name{font-family:var(--f-display);font-weight:500;font-size:18px;color:#EDEFF2;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank-user .handle{font-size:11px;color:var(--silver-faint);font-family:var(--f-mono);letter-spacing:0.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank-meta{font-family:var(--f-mono);font-size:12px;color:var(--silver-dim);letter-spacing:0.04em}
  .rank-meta.up{color:#7fb38c}
  .rank-meta.down{color:#b37f7f}
  .rank-meta.flat{color:var(--silver-faint)}
  .rank-score{font-family:var(--f-display);font-style:italic;font-weight:500;font-size:22px;color:var(--silver);text-align:right}

  /* side panel: featured + season */
  .side-card{background:var(--navy);border:1px solid var(--hairline);border-radius:4px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
  .side-card h3{font-family:var(--f-display);font-weight:500;font-size:22px;color:#EDEFF2;margin-bottom:4px}
  .side-card h3 em{font-style:italic;color:var(--red-bright)}
  .side-eyebrow{font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--silver-faint);margin-bottom:8px}
  .side-body{font-size:13px;color:var(--silver-dim);line-height:1.65;margin-top:14px;font-weight:300}
  .season-bar{margin-top:20px;height:6px;background:var(--navy-3);border-radius:3px;overflow:hidden;position:relative}
  .season-fill{height:100%;width:62%;background:linear-gradient(90deg,var(--red),var(--red-bright));border-radius:3px}
  .season-meta{display:flex;justify-content:space-between;font-family:var(--f-mono);font-size:11px;color:var(--silver-faint);margin-top:10px;letter-spacing:0.08em}

  .accolades{display:flex;flex-direction:column;gap:14px;margin-top:18px}
  .accolade{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--hairline)}
  .accolade:first-child{border-top:0;padding-top:0}
  .accolade .ico{width:34px;height:34px;border-radius:50%;background:var(--navy-3);display:grid;place-items:center;color:var(--silver-dim);border:1px solid var(--hairline-strong);flex-shrink:0}
  .accolade .t{font-size:13px;color:var(--silver);font-weight:500;letter-spacing:0.02em}
  .accolade .d{font-size:11px;color:var(--silver-faint);margin-top:2px;font-family:var(--f-mono);letter-spacing:0.04em}

  /* ---------- transitions ---------- */
  .fade-in{animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* responsive cap */

</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;

// post tunable params to an embedded prototype iframe once it has loaded
function tuneFx(e, params){
  const win = e.target.contentWindow;
  if(!win) return;
  Object.keys(params).forEach(name=>{
    win.postMessage({type:"param", name, value:params[name]}, "*");
  });
}

// ------------------------------ ICON SET (simple, geometric) ------------------------------
const Ico = {
  user: (s=18)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="8" r="3.4"/><path d="M5 19c1.5-3.5 4-5 7-5s5.5 1.5 7 5"/></svg>),
  lock: (s=18)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>),
  search: (s=14)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><circle cx="11" cy="11" r="6"/><path d="m20 20-4-4"/></svg>),
  play: (s=12)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>),
  more: (s=14)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>),
  share: (s=14)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="6" cy="12" r="2.2"/><circle cx="18" cy="6" r="2.2"/><circle cx="18" cy="18" r="2.2"/><path d="m8 11 8-4M8 13l8 4"/></svg>),
  baton: (s=18)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="6" cy="18" r="2.2"/><path d="M8 16 20 4"/></svg>),
  ribbon: (s=18)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="12" cy="9" r="5"/><path d="M9 13 7 22l5-3 5 3-2-9"/></svg>),
  star: (s=18)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="m12 4 2.5 5.2 5.5.8-4 4 1 5.6L12 17l-5 2.6 1-5.6-4-4 5.5-.8z"/></svg>),
  clock: (s=14)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg>),
  up: (s=14)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M12 6 4 16h16z"/></svg>),
  down: (s=14)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M12 18 4 8h16z"/></svg>),
  flat: (s=14)=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="11" width="16" height="2"/></svg>),
};

// stylized instrument silhouettes — used as ornamental marks only (simple paths)
const Instr = {
  trumpet: (s=44)=>(
    <svg width={s} height={s} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.2">
      <path d="M6 32h36" /><circle cx="46" cy="32" r="2"/><circle cx="52" cy="32" r="2"/>
      <path d="M58 24v16l-12-4v-8z"/><circle cx="20" cy="28" r="2"/><circle cx="28" cy="28" r="2"/><circle cx="36" cy="28" r="2"/>
    </svg>
  ),
  cello: (s=44)=>(
    <svg width={s} height={s} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.2">
      <path d="M32 6v14M28 16h8" />
      <ellipse cx="32" cy="40" rx="14" ry="18"/>
      <path d="M32 22v36M22 36c0-2 2-4 4-4M42 36c0-2-2-4-4-4"/>
    </svg>
  ),
  violin: (s=44)=>(
    <svg width={s} height={s} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.2">
      <path d="M14 8h6v6h-6zM22 14l28 32M44 50c2 6 8 6 8 2s-4-6-8-6c-3 0-5 1-5 4z" />
      <path d="M20 14 8 50"/>
    </svg>
  ),
  clef: (s=44)=>(
    <svg width={s} height={s} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.3">
      <path d="M32 6c-6 6-6 14 0 22s6 16 0 22c-4 4-12 4-12-4 0-6 4-8 8-8 6 0 10 6 8 14-2 8-12 8-16 4"/>
    </svg>
  ),
};

// ------------------------------ DATA ------------------------------
const PIECES = [
  {id:1, title:"Nocturne in", titleEm:"D minor", composer:"M. Voronova", date:"2026.04.18", duration:"14:22", tag:"DRAFT", instr:"violin", live:false},
  {id:2, title:"Symphony", titleEm:"No. III", composer:"K. Hartwell", date:"2026.05.02", duration:"42:08", tag:"FINAL", instr:"cello", live:false},
  {id:3, title:"Fanfare for the", titleEm:"Last Hour", composer:"A. Okafor", date:"2026.05.11", duration:"06:44", tag:"REHEARSAL", instr:"trumpet", live:true},
  {id:4, title:"Étude", titleEm:"Op. 12", composer:"L. Beaumont", date:"2026.03.27", duration:"08:11", tag:"DRAFT", instr:"clef", live:false},
  {id:5, title:"Concerto for", titleEm:"Two Violas", composer:"R. Kim & J. Aldea", date:"2026.04.30", duration:"28:55", tag:"FINAL", instr:"violin", live:false},
  {id:6, title:"Vespers at", titleEm:"Midnight", composer:"S. Calloway", date:"2026.05.14", duration:"19:30", tag:"REHEARSAL", instr:"cello", live:false},
  {id:7, title:"Overture", titleEm:"in Crimson", composer:"D. Mendelsohn", date:"2026.02.09", duration:"11:48", tag:"FINAL", instr:"trumpet", live:false},
  {id:8, title:"Suite for", titleEm:"Strings & Bell", composer:"T. Halverson", date:"2026.05.20", duration:"22:17", tag:"DRAFT", instr:"clef", live:true},
];

const FILTERS = [
  {id:"all", name:"All Works", count:48},
  {id:"final", name:"Final", count:18},
  {id:"rehearsal", name:"Rehearsal", count:7},
  {id:"draft", name:"Drafts", count:23},
  {id:"shared", name:"Shared", count:12},
];

const LEADERS = [
  {rank:1, name:"Helena", nameEm:"Vasquez-Reed", handle:"@maestra.helena", score:9847, pieces:42, weeks:14, trend:"up", trendN:"+128"},
  {rank:2, name:"Idris", nameEm:"Okafor", handle:"@i.okafor", score:9512, pieces:38, weeks:11, trend:"up", trendN:"+96"},
  {rank:3, name:"Mei-Lin", nameEm:"Tanaka", handle:"@meilin.t", score:9118, pieces:35, weeks:9, trend:"down", trendN:"-22"},
];
const RANKED = [
  {rank:4,  name:"Sébastien Vaughn",  handle:"@s.vaughn",    score:8804, pieces:31, trend:"up",   trendN:"+44"},
  {rank:5,  name:"Anya Petrosian",     handle:"@a.petrosian", score:8612, pieces:29, trend:"flat", trendN:"±0"},
  {rank:6,  name:"Theo Marchetti",     handle:"@t.marchetti", score:8408, pieces:28, trend:"up",   trendN:"+71"},
  {rank:7,  name:"Olamide Adesanya",   handle:"@o.adesanya",  score:8245, pieces:27, trend:"down", trendN:"-12"},
  {rank:8,  name:"Beatrix Halvorsen",  handle:"@bee.halv",    score:8092, pieces:25, trend:"up",   trendN:"+38"},
  {rank:9,  name:"Caleb Whitestone",   handle:"@c.whitestone",score:7944, pieces:24, trend:"down", trendN:"-58"},
  {rank:10, name:"Renée Beaumont",     handle:"@r.beaumont",  score:7811, pieces:23, trend:"up",   trendN:"+19"},
  {rank:11, name:"Mateo Calloway",     handle:"@m.calloway",  score:7702, pieces:22, trend:"flat", trendN:"±0"},
  {rank:12, name:"Naomi Hartwell",     handle:"@n.hartwell",  score:7588, pieces:21, trend:"up",   trendN:"+12"},
];

// ------------------------------ APP ------------------------------
function App(){
  const [view, setView] = useState("login");   // login | library | leaderboard
  const [user, setUser] = useState({name:"Helena", handle:"@maestra.helena"});
  const [u, setU] = useState("");
  const [p, setP] = useState("");
  const [remember, setRemember] = useState(true);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const onSignIn = (e)=>{ e.preventDefault(); setView("library"); };
  const signOut = ()=>{ setView("login"); setU(""); setP(""); };

  return (
    <React.Fragment>
      {view === "login" && <Login {...{u,setU,p,setP,remember,setRemember,onSignIn}} />}
      {view === "library" && <Library {...{user,view,setView,filter,setFilter,search,setSearch,signOut}} />}
      {view === "leaderboard" && <Leaderboard {...{user,view,setView,signOut}} />}
    </React.Fragment>
  );
}

// ------------------------------ LOGIN (hero) ------------------------------
// Simplified: rain-on-glass wallpaper behind, spinning vinyl groove screen-blended
// in front, and a single centred sign-in card. No poster / beams / ornaments.
function Login({u,setU,p,setP,remember,setRemember,onSignIn}){
  return (
    <div className="scene login-scene fade-in" data-screen-label="Login">
      <iframe className="fx-layer fx-rain" src="rain-on-glass.html" title="" tabIndex="-1" aria-hidden="true"></iframe>
      <iframe className="fx-layer fx-vinyl" src="vinyl-grooves.html" title="" tabIndex="-1" aria-hidden="true"
        onLoad={e=>tuneFx(e, {ROTATION_SPEED:0.6, GROOVE_DENSITY:1.0})}></iframe>
      <div className="login-tint" aria-hidden="true"></div>

      <div className="login-stack">
        <div className="login-brand">
          <div className="brand-mark"></div>
          <div className="brand-name">MAES<em>·</em>TRO</div>
        </div>

        <form className="login-card" onSubmit={onSignIn}>
          <h2>Take the <em>podium.</em></h2>
          <div className="hint">Sign in to your studio</div>

          <div className="field">
            <label>Conductor</label>
            <div className="field-wrap">
              {Ico.user()}
              <input value={u} onChange={e=>setU(e.target.value)} placeholder="helena.vasquez" autoComplete="username"/>
            </div>
          </div>

          <div className="field">
            <label>Passphrase</label>
            <div className="field-wrap">
              {Ico.lock()}
              <input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="••••••••••••" autoComplete="current-password"/>
            </div>
          </div>

          <button type="button" className={"check " + (remember ? "on" : "")} onClick={()=>setRemember(!remember)}>
            <span className="box"></span>
            <span>Keep me at the podium for 30 days</span>
          </button>

          <button type="submit" className="btn-primary">Sign in &nbsp;→</button>
          <button type="button" className="alt-btn" onClick={onSignIn}>Continue as guest conductor</button>
        </form>
      </div>
    </div>
  );
}

// ------------------------------ TOP BAR ------------------------------
function TopBar({view,setView,user,signOut}){
  return (
    <div className="topbar">
      <div className="brand">
        <div className="brand-mark"></div>
        <div className="brand-name">MAES<em>·</em>TRO</div>
      </div>
      <div className="nav-tabs">
        <button className={"nav-tab " + (view==="library" ? "active" : "")} onClick={()=>setView("library")}>Library</button>
        <button className={"nav-tab " + (view==="leaderboard" ? "active" : "")} onClick={()=>setView("leaderboard")}>Leaderboard</button>
        <button className="nav-tab" onClick={e=>e.preventDefault()}>Rehearsal</button>
        <button className="nav-tab" onClick={e=>e.preventDefault()}>Archive</button>
      </div>
      <div className="user-chip">
        <span>{user.handle}</span>
        <div className="avatar">H</div>
        <button className="signout" onClick={signOut}>Sign out</button>
      </div>
    </div>
  );
}

// ------------------------------ LIBRARY ------------------------------
function Library({user,view,setView,filter,setFilter,search,setSearch,signOut}){
  const filtered = PIECES.filter(p=>{
    if(filter !== "all"){
      const map = {final:"FINAL", rehearsal:"REHEARSAL", draft:"DRAFT"};
      if(map[filter] && p.tag !== map[filter]) return false;
    }
    if(search){
      const q = search.toLowerCase();
      return (p.title + " " + p.titleEm + " " + p.composer).toLowerCase().includes(q);
    }
    return true;
  });

  return (
    <div className="scene lib-scene fade-in" data-screen-label="Library">
      <TopBar {...{view,setView,user,signOut}} />

      <div className="page-head">
        <div>
          <div className="page-eyebrow"><span className="dot"></span>Your studio · last opened 14 minutes ago</div>
          <h1 className="page-title">The <em>library.</em></h1>
        </div>
        <div className="head-stats">
          <div className="head-stat"><div className="n">48</div><div className="l">Works</div></div>
          <div className="head-stat"><div className="n">11.2h</div><div className="l">Composed</div></div>
          <div className="head-stat"><div className="n">3</div><div className="l">In rehearsal</div></div>
        </div>
      </div>

      <div className="lib-controls">
        <div className="filters">
          {FILTERS.map(f=>(
            <button key={f.id} className={"filter " + (filter===f.id?"active":"")} onClick={()=>setFilter(f.id)}>
              {f.name}<span className="count">{f.count}</span>
            </button>
          ))}
        </div>
        <div className="lib-right">
          <div className="search">
            {Ico.search()}
            <input placeholder="Search works, composers, opus numbers…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <button className="new-btn"><span className="plus">+</span> Compose</button>
        </div>
      </div>

      <div className="library">
        {filtered.map(p=>(
          <PieceCard key={p.id} piece={p} />
        ))}
      </div>
    </div>
  );
}

function PieceCard({piece}){
  const Ins = Instr[piece.instr] || Instr.clef;
  return (
    <div className="piece">
      <div className="piece-art">
        <span className={"piece-badge " + (piece.live ? "live" : "")}>{piece.tag}</span>
        <div className="piece-instr">{Ins(34)}</div>
        <div className="vinyl"></div>
      </div>
      <div className="piece-body">
        <div className="piece-meta">
          <span>{piece.date}</span>
          <span>{piece.duration}</span>
        </div>
        <div className="piece-title">{piece.title} <em>{piece.titleEm}</em></div>
        <div className="piece-composer">— {piece.composer}</div>
        <div className="piece-foot">
          <div className="duration"><span style={{marginRight:6,opacity:0.6}}>{Ico.clock()}</span> {piece.duration}</div>
          <div className="piece-actions">
            <button className="icon-btn" title="Share">{Ico.share()}</button>
            <button className="icon-btn" title="More">{Ico.more()}</button>
            <button className="icon-btn play" title="Play"><span style={{marginLeft:2}}>{Ico.play()}</span></button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ------------------------------ LEADERBOARD ------------------------------
function Leaderboard({user,view,setView,signOut}){
  return (
    <div className="scene lb-scene fade-in" data-screen-label="Leaderboard">
      <TopBar {...{view,setView,user,signOut}} />

      <div className="page-head">
        <div>
          <div className="page-eyebrow"><span className="dot"></span>Season XII · 14 days remaining</div>
          <h1 className="page-title">The <em>podium.</em></h1>
        </div>
        <div className="head-stats">
          <div className="head-stat"><div className="n">4,812</div><div className="l">Conductors</div></div>
          <div className="head-stat"><div className="n">#37</div><div className="l">Your rank</div></div>
          <div className="head-stat"><div className="n">+128</div><div className="l">This week</div></div>
        </div>
      </div>

      <div className="lb-wrap">
        <div className="lb-main">
          <div className="podium">
            {/* laser-labyrinth, tamed into a calm overhead spotlight on the top 3 */}
            <iframe className="fx-spot" src="laser-labyrinth.html" title="" tabIndex="-1" aria-hidden="true"
              onLoad={e=>tuneFx(e, {SWEEP_SPEED:0.28, BEAM_INTENSITY:0.8})}></iframe>
            <PodiumCard l={LEADERS[1]} kind="silver" />
            <PodiumCard l={LEADERS[0]} kind="gold" />
            <PodiumCard l={LEADERS[2]} kind="bronze" />
          </div>

          <div className="ranks">
            <div className="ranks-head">
              <div>Rank</div><div>Conductor</div><div>Works</div><div>Trend</div><div>Score</div><div>Δ</div>
            </div>
            {RANKED.map(r=>(
              <div className="rank-row" key={r.rank}>
                <div className="rank-num">{String(r.rank).padStart(2,"0")}</div>
                <div className="rank-user">
                  <div className="avatar">{r.name.split(" ")[0][0]}</div>
                  <div className="who">
                    <div className="name">{r.name}</div>
                    <div className="handle">{r.handle}</div>
                  </div>
                </div>
                <div className="rank-meta">{r.pieces} works</div>
                <div className={"rank-meta " + r.trend}>
                  {r.trend==="up" ? Ico.up() : r.trend==="down" ? Ico.down() : Ico.flat()}
                </div>
                <div className="rank-score">{r.score.toLocaleString()}</div>
                <div className={"rank-meta " + r.trend} style={{textAlign:"right"}}>{r.trendN}</div>
              </div>
            ))}
          </div>
        </div>

        <aside className="lb-side">
          <div className="side-card">
            <div className="side-eyebrow">Featured baton</div>
            <h3>The Vasquez-Reed <em>Cadenza.</em></h3>
            <div className="side-body">
              Helena&apos;s &ldquo;Nocturne in D minor&rdquo; held the top of the charts for the fourteenth
              consecutive week — the longest streak this season.
            </div>
            <div className="season-bar"><div className="season-fill"></div></div>
            <div className="season-meta"><span>WK 14 / 22</span><span>62% complete</span></div>
          </div>

          <div className="side-card">
            <div className="side-eyebrow">Your accolades</div>
            <h3>This week&apos;s <em>laurels.</em></h3>
            <div className="accolades">
              <div className="accolade">
                <div className="ico">{Ico.ribbon()}</div>
                <div>
                  <div className="t">Conductor of the Week</div>
                  <div className="d">+250 PTS · 18 MAY 2026</div>
                </div>
              </div>
              <div className="accolade">
                <div className="ico">{Ico.star()}</div>
                <div>
                  <div className="t">Première · &ldquo;Fanfare for the Last Hour&rdquo;</div>
                  <div className="d">+180 PTS · 11 MAY 2026</div>
                </div>
              </div>
              <div className="accolade">
                <div className="ico">{Ico.baton()}</div>
                <div>
                  <div className="t">Flawless tempo · 14 bars in a row</div>
                  <div className="d">+90 PTS · 09 MAY 2026</div>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  );
}

function PodiumCard({l, kind}){
  const medalCls = kind==="gold"?"g1":kind==="silver"?"g2":"g3";
  const rankN = kind==="gold"?"01":kind==="silver"?"02":"03";
  const cardCls = "podium-card" + (kind==="gold" ? " gold" : "");
  const rankCls = "podium-rank" + (kind==="gold" ? " gold" : "");
  return (
    <div className={cardCls}>
      <div className={"medal " + medalCls}>{rankN}</div>
      <div className={rankCls}>{kind==="gold"?"Maestro of the Season":kind==="silver"?"Second Chair":"Third Chair"}</div>
      <div className="podium-name">{l.name} <em>{l.nameEm}</em></div>
      <div className="podium-handle">{l.handle}</div>
      <div className="podium-score">{l.score.toLocaleString()}</div>
      <div className="podium-score-label">Points · {l.pieces} works · {l.weeks} wks at top</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
